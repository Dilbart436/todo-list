<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo App</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <main class="layout">
        <section class="todo">

            <div class="todo__app">
                <h1 class="todo__title">
                    To-DO List
                    <img src="images/icon.png" alt="Todo Icon" class="todo__icon">
                </h1>

                <div class="todo__row">
                    <input type="text" id="input-box" class="todo__input" placeholder="Add your task">
                    <button class="todo__button">Add</button>
                </div>

                <ul id="list-container" class="todo__list">
                    <!-- Dynamic task will appear here -->
                    <!-- Normal Item -->
                    <!-- <li class="todo__item">
                        Learn JavaScript
                        <span class="todo__delete">&times;</span>
                    </li> -->
                    <!-- Checked Item -->
                    <!-- <li class="todo__item todo__item--checked">
                        Learn CSS
                        <span class="todo__delete">&times;</span>
                    </li> -->

                    <!-- Another Item -->
                    <!-- <li class="todo__item">
                        Build Todo App
                        <span class="todo__delete">&times;</span>
                    </li> -->
                </ul>
            </div>

        </section>
    </main>




    <script src="script.js"></script>

</body>

</html>
